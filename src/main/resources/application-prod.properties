# Server ? Render injects the PORT variable
server.port=${PORT:8080}

# PostgreSQL ? Render provides these environment variables automatically
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate ? safe for production (update schema, not drop)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT ? you MUST set this environment variable manually on Render
jwt.secret=${JWT_SECRET}