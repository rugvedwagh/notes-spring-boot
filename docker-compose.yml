services:
  postgres:
    image: postgres:16
    container_name: notes-postgres

    environment:
      POSTGRES_DB: notes-postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  postgres-data: